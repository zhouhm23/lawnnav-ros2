path_coverage:
  ros__parameters:
    # 全局坐标系，默认map（规划参考坐标系）
    global_frame: "map"
    
    # 每条路径的宽度
    robot_width: 0.171
    
    # 认为可通过的最大代价值：如果一个单元格的代价值 ≤ 70，算法就认为这个地方是空地，可以规划路径穿过。
    costmap_max_non_lethal: 70
    
    # 是否执行弓字形分解
    boustrophedon_decomposition: true
    
    # 首先绕着单元格行驶
    border_drive: false
    
    # 机器人基座标系
    base_frame: "base_footprint"
    
    # 在每个 min_wp_dist 中放置的航点数：要插入的航点数量 = (路径段总长度 / min_wp_dist) * num_points
    num_points: 2
    
    # 在考虑拆分之前航点之间的最大距离：如果这个距离大于或等于 min_wp_dist 的值，系统就会认为这段路径太长了，需要在这中间插入更多的点来让路径变得更精细。
    min_wp_dist: 0.2

    # 按用户区域掩膜裁剪后，允许向外补偿的距离（米）。
    # 在周边无障碍时适度外扩，提升边界覆盖连续性。
    polygon_expand: 0.11  # 502d505成功值为0.05，但现在调高点试试

    # 覆盖线距边界的内缩距离（米）。todo：这个还在调参中。
    coverage_clearance: 0.09

    # 外扩圈（polygon_expand）可接受的最大代价值。
    # 设为 0 表示只允许白色自由区，避免扩张到灰色膨胀层。
    # 调高到 50 以在 mapping 模式下容忍适度的 inflation。
    expand_max_non_lethal: 50

    # 执行阶段可接受的最大代价值。
    # 对齐502d505成功值，保守进入膨胀层灰区。
    drive_max_non_lethal: 50