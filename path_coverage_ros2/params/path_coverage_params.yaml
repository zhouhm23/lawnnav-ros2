path_coverage:
  ros__parameters:
    # 全局坐标系，默认map（规划参考坐标系）
    global_frame: "map"
    
    # 机器人宽度（单位：米），用于路径间距/避障计算
    robot_width: 0.2
    
    # 代价地图非致命阈值(0-255)，≤为可通行区域
    costmap_max_non_lethal: 70
    
    # 是否启用之字形区域分解（覆盖规划算法）
    boustrophedon_decomposition: true
    
    # 是否先沿覆盖区域边界行驶（覆盖规划辅助）
    border_drive: false
    
    # 机器人基坐标系，默认base_footprint（坐标变换用）
    base_frame: "base_footprint"
    
    # 路径段插值采样点数，影响路径平滑度（降低此值可减少圆弧区域的密集点）
    num_points: 1
    
    # 最小航点间距（单位：米），过滤密集航点（增大此值可进一步过滤密集点）
    min_wp_dist: 0.2