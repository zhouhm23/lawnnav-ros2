controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 1.2

    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"] 
    controller_plugins: ["FollowPath"]

    # Progress checker parameters
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 5.0   # 5s内不动0.5m就放弃目标

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.005
      yaw_goal_tolerance: 0.02 # 1° ≈0.01745329rad
    # Regulated Pure Pursuit parameters
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.22
      lookahead_dist: 0.28
      min_lookahead_dist: 0.18
      max_lookahead_dist: 0.45
      lookahead_time: 0.8
      rotate_to_heading_angular_vel: 1.8
      transform_tolerance: 0.5
      use_velocity_scaled_lookahead_dist: false
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.35
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.2
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 1.1
      regulated_linear_scaling_min_speed: 0.12
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.2
      max_angular_accel: 2.5
      max_robot_pose_search_dist: 10.0
      use_interpolation: true
controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False

