# 这个是单纯相机建图的参数文件，雷达相关参数已注释掉
rtabmap:
  ros__parameters:
    # RTAB-Map parameters (strings are safer for packaged binary)
    'Grid/RangeMin': '0.04'
    'Grid/RangeMax': '10.0'
    'Grid/CellSize': '0.05'
    # Ground projection / detection
    # Ground height thresholds (reverted to previous values)
    'Grid/MinGroundHeight': '-0.20'
    'Grid/MaxGroundHeight': '0.02'
    'Grid/MaxGroundAngle': '20'
    'Grid/MapFrameProjection': 'true'
    'Grid/NormalsSegmentation': 'true'
    'Grid/3D': 'true'
    'Grid/GroundIsObstacle': 'false'
    'Grid/RayTracing': 'true'
    'proj_max_ground_height': '0.02'
    'proj_max_ground_angle': '20'
    'RGBD/ProximityBySpace': 'true'
    'RGBD/ProximityPathMaxNeighbors': '5'
    'RGBD/NeighborLinkRefining': 'false'
    'Rtabmap/DetectionRate': '8'
    'RGBD/LinearUpdate': '0.10'
    'RGBD/AngularUpdate': '0.10'
    'Vis/MaxFeatures': '800'
    'Vis/MinInliers': '6' # Vis/MinInliers should be >= 6
    'OdomF2M/MaxSize': '1000'
    'RGBD/CreateOccupancyGrid': 'true'
    'queue_size': 30
    # rgbd包含d，不能同时为真
    'subscribe_rgbd': true
    'subscribe_depth': false
    'subscribe_scan': true  # 纯扫描模式：虚拟雷达做ICP定位（pointcloud_to_laserscan→/scan_raw）
    'Reg/Strategy': '2'
    'Reg/Force3DoF': 'true'
    # Params previously hardcoded in launch file, now centralized here:
    'Optimizer/GravitySigma': '0'  # Disable imu constraints (2D nav)
    'grid_size': '20'
    'Grid/Sensor': 'true'

# 以下是RTAB-Map参数列表，注释掉的参数可以根据需要启用和调整
# BRIEF/Bytes # 特征描述子BRIEF的字节数
# BRISK/Octaves # BRISK特征检测的octaves数
# BRISK/PatternScale # BRISK特征模板尺度
# BRISK/Thresh # BRISK特征检测阈值
# Bayes/FullPredictionUpdate # 贝叶斯滤波器是否完全预测更新
# Bayes/PredictionLC # 是否用预测进行回环检测
# Bayes/VirtualPlacePriorThr # 虚拟地点先验阈值
# Db/TargetVersion # 数据库目标版本
# DbSqlite3/CacheSize # SQLite缓存大小(KB)
# DbSqlite3/InMemory # 使用内存数据库
# DbSqlite3/JournalMode # 日志模式(DELETE/WAL/MEMORY等)
# DbSqlite3/Synchronous # 同步标志(OFF/NORMAL/FULL)
# DbSqlite3/TempStore # 临时文件存储位置(0:文件 1:内存)
# FAST/CV # FAST特征使用OpenCV实现
# FAST/Gpu # FAST特征使用GPU
# FAST/GpuKeypointsRatio # GPU提取的关键点比例
# FAST/GridCols # FAST特征网格列数
# FAST/GridRows # FAST特征网格行数
# FAST/MaxThreshold # FAST最大阈值
# FAST/MinThreshold # FAST最小阈值
# FAST/NonmaxSuppression # 是否使用非极大值抑制
# FAST/Threshold # FAST角点检测阈值
# FREAK/NOctaves # FREAK描述子octave数
# FREAK/OrientationNormalized # FREAK方向归一化
# FREAK/PatternScale # FREAK模板尺度
# FREAK/ScaleNormalized # FREAK尺度归一化
# GFTT/BlockSize # GFTT角点检测的块大小
# GFTT/K # GFTT的K参数(响应计算)
# GFTT/MinDistance # GFTT最小角点间距
# GFTT/QualityLevel # GFTT质量水平阈值
# GFTT/UseHarrisDetector # 是否使用Harris检测器替代Shi-Tomasi
# GMS/ThresholdFactor # GMS匹配的阈值因子
# GMS/WithRotation # GMS启用旋转
# GMS/WithScale # GMS启用尺度
# GTSAM/IncRelinearizeSkip # GTSAM增量重线性化跳过步数
# GTSAM/IncRelinearizeThreshold # GTSAM增量重线性化阈值
# GTSAM/Incremental # 使用GTSAM增量优化
# GTSAM/Optimizer # GTSAM优化器类型
# Grid/3D # 生成三维占用网格
# Grid/CellSize # 网格单元尺寸(m)
# Grid/ClusterRadius # 点云聚类半径
# Grid/DepthDecimation # 深度图下采样率
# Grid/DepthRoiRatios # 深度图ROI比率 [x1,x2,y1,y2]
# Grid/FlatObstacleDetected # 是否检测平坦障碍物
# Grid/FootprintHeight # 机器人足迹高度
# Grid/FootprintLength # 机器人足迹长度
# Grid/FootprintWidth # 机器人足迹宽度
# Grid/GroundIsObstacle # 地面作为障碍物
# Grid/MapFrameProjection # 网格投影到地图坐标系
# Grid/MaxGroundAngle # 地面最大倾斜角(度)
