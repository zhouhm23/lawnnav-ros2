# Vis/CorGuessMatchToProjection # 预测匹配投影
# Vis/CorGuessWinSize # 预测匹配窗口尺寸
# Vis/CorNNDR # 视觉匹配最近邻比率
# Vis/CorNNType # 视觉匹配NN类型
# Vis/CorType # 视觉匹配类型
# Vis/DepthAsMask # 深度作为掩模
# Vis/EpipolarGeometryVar # 极线几何方差
# Vis/EstimationType # 位姿估计类型(0:3D 1:2D 2:5DoF等)
# Vis/FeatureType # 视觉特征类型(0:SIFT 1:SURF等)
# Vis/ForwardEstOnly # 仅前向估计
# Vis/GridCols # 视觉特征提取网格列数
# Vis/GridRows # 视觉特征提取网格行数
# Vis/InlierDistance # 内点距离阈值
# Vis/Iterations # 视觉估计迭代次数
# Vis/MaxDepth # 视觉最大深度(m)
# Vis/MaxFeatures # 视觉最大特征数
# Vis/MeanInliersDistance # 平均内点距离
# Vis/MinDepth # 视觉最小深度(m)
# Vis/MinInliers # 视觉最小内点数
# Vis/MinInliersDistribution # 视觉最小内点分布
# Vis/PnPFlags # PnP标志
# Vis/PnPMaxVariance # PnP最大方差
# Vis/PnPRefineIterations # PnP优化迭代次数
# Vis/PnPReprojError # PnP重投影误差
# Vis/PnPSamplingPolicy # PnP采样策略
# Vis/PnPSplitLinearCovComponents # PnP分割线性协方差成分
# Vis/PnPVarianceMedianRatio # PnP方差中位数比率
# Vis/RefineIterations # 视觉优化迭代次数
# Vis/RoiRatios # 视觉ROI比率
# Vis/SSC # 视觉签名相似度约束
# Vis/SubPixEps # 视觉亚像素精度
# Vis/SubPixIterations # 视觉亚像素迭代次数
# Vis/SubPixWinSize # 视觉亚像素窗口尺寸
# approx_sync # 是否使用近似时间同步
# cloud_output_voxelized # 输出点云是否体素滤波
# cloud_subtract_filtering # 点云减法滤波
# cloud_subtract_filtering_min_neighbors # 减法滤波最小邻域数
# config_path # RTAB-Map配置文件路径
# database_path # 数据库文件路径
# diagnostic_updater.period # 诊断更新周期(s)
# diagnostic_updater.use_fqn # 诊断是否使用全限定节点名
# frame_id # 机器人基坐标系frame (base_link)
# g2o/Baseline # g2o基线距离(立体视觉)
# g2o/Optimizer # g2o优化器类型
# g2o/PixelVariance # g2o像素方差
# g2o/RobustKernelDelta # g2o鲁棒核函数delta
# g2o/Solver # g2o求解器类型
# gen_depth # 从扫描生成深度图
# gen_depth_decimation # 深度生成降采样
# gen_depth_fill_holes_error # 深度补洞误差阈值
# gen_depth_fill_holes_size # 深度补洞尺寸
# gen_depth_fill_iterations # 深度补洞迭代次数
# gen_scan # 从深度/点云生成2D扫描
# gen_scan_max_depth # 生成扫描的最大深度
# gen_scan_min_depth # 生成扫描的最小深度
# ground_truth_base_frame_id # 真值基准坐标系
# ground_truth_frame_id # 真值物体坐标系
# initial_pose # 初始位姿 [x y z roll pitch yaw]
# is_rtabmap_paused # RTAB-Map是否暂停
# landmark_angular_variance # 路标角度方差
# landmark_linear_variance # 路标位置方差
# latch # 是否latch发布地图
# loc_thr # 定位时视觉匹配阈值
# log_to_rosout_level # 输出到rosout的日志等级
# map_always_update # 地图持续更新
# map_cleanup # 地图清理(去噪声)
# map_empty_ray_tracing # 空射线追踪
# map_filter_angle # 地图过滤角度
# map_filter_radius # 地图过滤半径
# map_frame_id # 地图坐标系frame
# octomap_tree_depth # 八叉树地图深度
# odom_frame_id # 里程计坐标系frame
# odom_frame_id_init # 初始化里程计坐标系
# odom_sensor_sync # 用里程计同步传感器数据(而非时间戳对齐)
# odom_tf_angular_variance # 里程计TF角度方差
# odom_tf_linear_variance # 里程计TF位置方差
# pub_loc_pose_only_when_localizing # 仅在定位模式发布位姿
# publish_tf # 是否发布TF
# qos # 默认QoS
# qos_camera_info # 相机信息QoS
# qos_gps # GPS QoS
# qos_image # 图像QoS
# qos_imu # IMU QoS
# qos_odom # 里程计QoS
# qos_overrides./parameter_events.publisher.depth # 参数事件发布者队列深度覆盖
# qos_overrides./parameter_events.publisher.durability # 参数事件发布者持久性覆盖
# qos_overrides./parameter_events.publisher.history # 参数事件发布者历史覆盖
# qos_overrides./parameter_events.publisher.reliability # 参数事件发布者可靠性覆盖
# qos_overrides./tf.publisher.depth # TF发布者队列深度覆盖
# qos_overrides./tf.publisher.durability # TF发布者持久性覆盖
# qos_overrides./tf.publisher.history # TF发布者历史覆盖
# qos_overrides./tf.publisher.reliability # TF发布者可靠性覆盖
# qos_scan # 激光扫描QoS
# qos_sensor_data # 传感器数据QoS
# qos_user_data # 用户数据QoS
# queue_size # 话题队列大小
# rgbd_cameras # RGB-D相机数量
# scan_cloud_is_2d # 扫描点云是2D
# scan_cloud_max_points # 扫描点云最大点数
# stereo_to_depth # 立体视觉转深度
# subscribe_depth # 订阅深度话题
# subscribe_odom # 订阅里程计话题
# subscribe_odom_info # 订阅里程计信息话题
# subscribe_rgb # 订阅RGB话题
# subscribe_rgbd # 订阅RGB-D同步话题
# subscribe_scan # 订阅激光扫描话题
# subscribe_scan_cloud # 订阅激光点云话题
# subscribe_scan_descriptor # 订阅激光描述子话题
# subscribe_sensor_data # 订阅传感器数据话题(异步输入)
# subscribe_stereo # 订阅立体视觉话题
# subscribe_user_data # 订阅用户数据话题
# sync_queue_size # 同步队列大小
# tf_delay # TF发布时间延迟(s)
# tf_tolerance # TF时间容忍(s)
# topic_queue_size # 话题队列大小(独立)
# use_action_for_goal # 使用action接口发送目标
# use_saved_map # 使用保存的地图(定位模式)
# use_sim_time # 使用仿真时间
# wait_for_transform # 等待TF变换的时间(s)