# pointcloud_to_laserscan 参数 — 运行时加载，修改后直接重启 launch 生效，无需编译
depth_to_scan:
  ros__parameters:
    target_frame: "base_footprint"
    transform_tolerance: 0.1
    min_height: 0.02      # 低于此高度的点被过滤（地面）
    max_height: 0.30      # 高于此高度的点被过滤（天花板/桌面）
    angle_min: -1.57      # -90度
    angle_max: 1.57       # +90度
    angle_increment: 0.0087  # ~0.5度分辨率
    scan_time: 0.1        # 10Hz
    range_min: 0.1        # 10cm最小距离
    range_max: 3.0        # 3m最大距离
    use_inf: True
    inf_epsilon: 1.0
